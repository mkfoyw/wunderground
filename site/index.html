<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Underground Dashboard</title>
    <meta
      name="description"
      content="在一个页面里快速切换并查看 Weather Underground 的 today、hourly 与最近 6 天 history daily 页面。"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="top-section">
        <section class="toolbar-card">
          <nav id="city-list" class="city-list" aria-label="城市切换"></nav>
        </section>
      </header>

      <main class="content">
        <section class="frame-card frame-card-main">
          <div class="card-header">
            <div>
              <h2>Today</h2>
            </div>
            <a
              id="overview-card-link"
              class="inline-link"
              href="https://www.wunderground.com/weather/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap">
            <iframe
              id="overview-frame"
              title="Weather Underground Overview"
              loading="lazy"
              src="https://www.wunderground.com/weather/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-main">
          <div class="card-header">
            <div>
              <h2>Hourly</h2>
            </div>
            <a
              id="hourly-card-link"
              class="inline-link"
              href="https://www.wunderground.com/hourly/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap">
            <iframe
              id="hourly-frame"
              title="Weather Underground Hourly"
              loading="lazy"
              src="https://www.wunderground.com/hourly/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-forecast" data-forecast-offset="1">
          <div class="card-header">
            <div>
              <h2 class="forecast-title">Forecast Day 1</h2>
            </div>
            <a
              class="inline-link forecast-card-link"
              href="https://www.wunderground.com/hourly/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-forecast">
            <iframe
              class="forecast-frame"
              title="Weather Underground Forecast Day 1"
              loading="lazy"
              src="https://www.wunderground.com/hourly/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-forecast" data-forecast-offset="2">
          <div class="card-header">
            <div>
              <h2 class="forecast-title">Forecast Day 2</h2>
            </div>
            <a
              class="inline-link forecast-card-link"
              href="https://www.wunderground.com/hourly/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-forecast">
            <iframe
              class="forecast-frame"
              title="Weather Underground Forecast Day 2"
              loading="lazy"
              src="https://www.wunderground.com/hourly/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-history" data-history-offset="0">
          <div class="card-header">
            <div>
              <h2 class="history-title">History Daily</h2>
            </div>
            <a
              class="inline-link history-card-link"
              href="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-history">
            <iframe
              class="history-frame"
              title="Weather Underground History Daily"
              loading="lazy"
              src="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-history" data-history-offset="1">
          <div class="card-header">
            <div>
              <h2 class="history-title">History Daily</h2>
            </div>
            <a
              class="inline-link history-card-link"
              href="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-history">
            <iframe
              class="history-frame"
              title="Weather Underground History Daily"
              loading="lazy"
              src="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-history" data-history-offset="2">
          <div class="card-header">
            <div>
              <h2 class="history-title">History Daily</h2>
            </div>
            <a
              class="inline-link history-card-link"
              href="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-history">
            <iframe
              class="history-frame"
              title="Weather Underground History Daily"
              loading="lazy"
              src="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-history" data-history-offset="3">
          <div class="card-header">
            <div>
              <h2 class="history-title">History Daily</h2>
            </div>
            <a
              class="inline-link history-card-link"
              href="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-history">
            <iframe
              class="history-frame"
              title="Weather Underground History Daily"
              loading="lazy"
              src="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-history" data-history-offset="4">
          <div class="card-header">
            <div>
              <h2 class="history-title">History Daily</h2>
            </div>
            <a
              class="inline-link history-card-link"
              href="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-history">
            <iframe
              class="history-frame"
              title="Weather Underground History Daily"
              loading="lazy"
              src="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>

        <section class="frame-card frame-card-history" data-history-offset="5">
          <div class="card-header">
            <div>
              <h2 class="history-title">History Daily</h2>
            </div>
            <a
              class="inline-link history-card-link"
              href="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
              target="_blank"
              rel="noreferrer"
            >
              官方页面
            </a>
          </div>
          <div class="frame-wrap frame-wrap-history">
            <iframe
              class="history-frame"
              title="Weather Underground History Daily"
              loading="lazy"
              src="https://www.wunderground.com/history/daily/cn/chengdu/ZUUU"
            ></iframe>
          </div>
        </section>
      </main>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
